<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Sauce</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            color: white;
            min-height: 100vh;
            background: radial-gradient(circle, #d83b3b 0%, #991b1b 100%);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Dripping sauce border at the top */
        .drip-border {
            position: absolute;
            top: 0;
            width: 100%;
            height: 6rem;
            fill: #991b1b;
            z-index: 20;
        }

        /* Bubbles rise from below; the animation loops on its own */
        .bubbles { position: absolute; inset: 0; overflow: hidden; }
        .bubble {
            position: absolute;
            bottom: -50px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: rise linear infinite;
        }
        @keyframes rise {
            to {
                bottom: 110vh;
                transform: translateX(-20px) scale(1.5);
                opacity: 0;
            }
        }

        /* Main content gently bobs */
        main {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 0 1.5rem;
            max-width: 42rem;
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50%     { transform: translateY(-15px) rotate(2deg); }
        }

        .pasta { font-size: 5rem; margin-bottom: 1rem; }

        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 8rem;
            line-height: 1;
            color: #facc15;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
            margin-bottom: 0.5rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            color: #ffedd5;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.125rem;
            color: #fee2e2;
            opacity: 0.9;
            max-width: 28rem;
            margin: 0 auto 2.5rem;
        }

        .button {
            display: inline-block;
            padding: 1rem 2rem;
            font-size: 1.125rem;
            font-weight: 700;
            color: #7f1d1d;
            background: #facc15;
            border-radius: 9999px;
            text-decoration: none;
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        .button:hover { background: #fde047; transform: scale(1.05); }

        /* Bump up sizes on tablet and larger */
        @media (min-width: 768px) {
            .pasta { font-size: 8rem; }
            h1 { font-size: 150px; }
            h2 { font-size: 3rem; }
            p  { font-size: 1.25rem; }
        }
    </style>
</head>
<body>

    <svg class="drip-border" viewBox="0 0 1200 120" preserveAspectRatio="none">
        <path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z"/>
    </svg>

    <div class="bubbles" id="bubbles"></div>

    <main>
        <div class="pasta">🍝</div>
        <h1>404</h1>
        <h2>Lost in the Sauce.</h2>
        <p>Mama mia! The page you're looking for has been overcooked, misplaced, or simply vanished into the marinara abyss.</p>
        <a href="#" class="button">← Back to the Kitchen</a>
    </main>

    <script>
        // 25 bubbles, created once. CSS handles the looping forever.
        const container = document.getElementById('bubbles');
        for (let i = 0; i < 25; i++) {
            const bubble = document.createElement('span');
            const size = Math.random() * 30 + 10;
            bubble.className = 'bubble';
            bubble.style.cssText = `
                left: ${Math.random() * 100}%;
                width: ${size}px;
                height: ${size}px;
                animation-duration: ${3 + Math.random() * 4}s;
                animation-delay: ${Math.random() * 5}s;
            `;
            container.appendChild(bubble);
        }
    </script>
</body>
</html>
