<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Sauce</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background: radial-gradient(circle at center, #d83b3b 0%, #991b1b 100%);
            overflow: hidden; /* Keep the sauce contained */
        }
        
        .font-display {
            font-family: 'Fredoka One', cursive;
        }

        /* Dripping sauce animation */
        .drip {
            transform-origin: top;
            animation: drip-drop 4s infinite ease-in-out alternate;
        }

        .drip:nth-child(2n) {
            animation-duration: 5s;
            animation-delay: 1s;
        }

        .drip:nth-child(3n) {
            animation-duration: 3s;
            animation-delay: 0.5s;
        }

        @keyframes drip-drop {
            0% { transform: scaleY(1); }
            100% { transform: scaleY(1.3); }
        }

        /* Boiling bubbles animation */
        .bubble {
            position: absolute;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            bottom: -50px;
            animation: rise 4s infinite ease-in;
        }

        @keyframes rise {
            0% {
                bottom: -50px;
                transform: translateX(0) scale(1);
                opacity: 0.8;
            }
            50% {
                transform: translateX(20px) scale(1.2);
            }
            100% {
                bottom: 110vh;
                transform: translateX(-20px) scale(1.5);
                opacity: 0;
            }
        }

        /* Floating content */
        .float-animation {
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
        }
    </style>
</head>
<body class="text-white min-h-screen relative flex flex-col items-center justify-center selection:bg-yellow-400 selection:text-red-900">

    <!-- Dripping Sauce Top Border (SVG) -->
    <div class="absolute top-0 left-0 w-full z-20 pointer-events-none drop-shadow-xl text-red-800">
        <svg viewBox="0 0 1200 120" preserveAspectRatio="none" class="w-full h-16 sm:h-24 md:h-32 fill-current">
            <path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" class="drip"></path>
            <path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" class="drip"></path>
            <path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" class="drip"></path>
        </svg>
    </div>

    <!-- Container for dynamic boiling bubbles -->
    <div id="bubbles-container" class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Bubbles injected via JS -->
    </div>

    <!-- Main Content -->
    <main class="relative z-10 text-center px-6 max-w-2xl mx-auto float-animation">
        <!-- Emoji Icon -->
        <div class="text-7xl md:text-9xl mb-4 drop-shadow-2xl filter hover:scale-110 transition-transform duration-300 cursor-pointer" title="A warm bowl of marinara">
            🍝
        </div>
        
        <!-- The 404 Error -->
        <h1 class="font-display text-8xl md:text-[150px] leading-none text-yellow-400 drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)] mb-2">
            404
        </h1>
        
        <!-- Theme message -->
        <h2 class="text-3xl md:text-5xl font-bold mb-6 text-orange-100 drop-shadow-md">
            Lost in the Sauce.
        </h2>
        
        <p class="text-lg md:text-xl text-red-100 mb-10 opacity-90 leading-relaxed max-w-md mx-auto">
            Mama mia! The page you're looking for has been overcooked, misplaced, or simply vanished into the marinara abyss. 
        </p>

        <!-- Call to Action -->
        <a href="#" class="inline-flex items-center justify-center px-8 py-4 text-lg font-bold text-red-900 bg-yellow-400 rounded-full shadow-lg hover:bg-yellow-300 hover:scale-105 hover:shadow-yellow-500/50 transition-all duration-300 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-2 group-hover:-translate-x-1 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to the Kitchen
        </a>
    </main>

    <!-- Interactive script to generate bubbles -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('bubbles-container');
            const bubbleCount = 20;

            for (let i = 0; i < bubbleCount; i++) {
                createBubble(container);
            }

            // Continuously create new bubbles
            setInterval(() => {
                createBubble(container);
            }, 800);
        });

        function createBubble(container) {
            const bubble = document.createElement('div');
            bubble.classList.add('bubble');
            
            // Randomize size between 10px and 40px
            const size = Math.random() * 30 + 10;
            bubble.style.width = `${size}px`;
            bubble.style.height = `${size}px`;
            
            // Randomize horizontal position
            const left = Math.random() * 100;
            bubble.style.left = `${left}%`;
            
            // Randomize animation duration between 3s and 7s
            const duration = Math.random() * 4 + 3;
            bubble.style.animationDuration = `${duration}s`;
            
            // Randomize animation delay
            const delay = Math.random() * 5;
            bubble.style.animationDelay = `${delay}s`;

            container.appendChild(bubble);

            // Remove bubble after animation completes to keep DOM clean
            setTimeout(() => {
                bubble.remove();
            }, (duration + delay) * 1000);
        }
    </script>
</body>
</html>
